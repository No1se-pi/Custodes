<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Animated Custodes mark</title>
  <desc id="desc">A transparent bronze ward with counter-rotating rings and a glowing pupil.</desc>
  <style>
    .orbit-outer,
    .orbit-middle,
    .orbit-inner {
      transform-box: view-box;
      transform-origin: 256px 256px;
    }

    .orbit-outer {
      animation: rotate-cw 34s linear infinite;
    }

    .orbit-middle {
      animation: rotate-ccw 26s linear infinite;
    }

    .orbit-inner {
      animation: rotate-cw 18s linear infinite;
    }

    .pupil-glow {
      animation: pulse 2.8s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }

    @keyframes rotate-cw {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes rotate-ccw {
      to {
        transform: rotate(-360deg);
      }
    }

    @keyframes pulse {
      0%,
      100% {
        opacity: 0.72;
        transform: scale(0.96);
      }

      50% {
        opacity: 1;
        transform: scale(1.08);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .orbit-outer,
      .orbit-middle,
      .orbit-inner,
      .pupil-glow {
        animation: none;
      }
    }
  </style>
  <defs>
    <radialGradient id="mist" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#d2a15f" stop-opacity="0.28"/>
      <stop offset="0.46" stop-color="#70b7aa" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#0f1110" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bronze" x1="86" y1="74" x2="426" y2="438" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f3c980"/>
      <stop offset="0.36" stop-color="#b87a3e"/>
      <stop offset="0.72" stop-color="#d8a761"/>
      <stop offset="1" stop-color="#7a4e29"/>
    </linearGradient>
    <radialGradient id="ember" cx="50%" cy="45%" r="58%">
      <stop offset="0" stop-color="#fff3a7"/>
      <stop offset="0.38" stop-color="#f0b21e"/>
      <stop offset="1" stop-color="#c87400"/>
    </radialGradient>
    <filter id="softBlur" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#000" flood-opacity="0.42"/>
    </filter>
    <filter id="emberGlow" x="-90%" y="-90%" width="280%" height="280%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="9" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.95 0 0.78 0 0 0.43 0 0 0.24 0 0 0 0 0 0.95 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <g id="divider" stroke="url(#bronze)" stroke-width="8" stroke-linecap="round">
      <path d="M256 43v54"/>
      <path d="M239 64l17 24 17-24"/>
    </g>
    <g id="rune" stroke="url(#bronze)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M256 55v42"/>
      <path d="M241 78l15 19 15-19"/>
      <path d="M226 103h60"/>
    </g>
    <g id="tick" stroke="url(#bronze)" stroke-width="7" stroke-linecap="round">
      <path d="M256 118v28"/>
    </g>
  </defs>
  <circle cx="256" cy="256" r="230" fill="url(#mist)" filter="url(#softBlur)"/>
  <g filter="url(#shadow)">
    <g class="orbit-outer">
      <circle cx="256" cy="256" r="220" fill="none" stroke="url(#bronze)" stroke-width="14"/>
      <circle cx="256" cy="256" r="180" fill="none" stroke="url(#bronze)" stroke-width="8" opacity="0.92"/>
      <g opacity="0.92">
        <use href="#divider" transform="rotate(0 256 256)"/>
        <use href="#divider" transform="rotate(60 256 256)"/>
        <use href="#divider" transform="rotate(120 256 256)"/>
        <use href="#divider" transform="rotate(180 256 256)"/>
        <use href="#divider" transform="rotate(240 256 256)"/>
        <use href="#divider" transform="rotate(300 256 256)"/>
      </g>
    </g>
    <g class="orbit-middle" fill="none" opacity="0.95">
      <circle cx="256" cy="256" r="132" stroke="url(#bronze)" stroke-width="7"/>
      <use href="#rune" transform="rotate(30 256 256)"/>
      <use href="#rune" transform="rotate(90 256 256)"/>
      <use href="#rune" transform="rotate(150 256 256)"/>
      <use href="#rune" transform="rotate(210 256 256)"/>
      <use href="#rune" transform="rotate(270 256 256)"/>
      <use href="#rune" transform="rotate(330 256 256)"/>
    </g>
    <g class="orbit-inner" opacity="0.86">
      <use href="#tick" transform="rotate(0 256 256)"/>
      <use href="#tick" transform="rotate(24 256 256)"/>
      <use href="#tick" transform="rotate(336 256 256)"/>
      <use href="#tick" transform="rotate(156 256 256)"/>
      <use href="#tick" transform="rotate(180 256 256)"/>
      <use href="#tick" transform="rotate(204 256 256)"/>
    </g>
    <path d="M98 256c38-58 93-88 158-88s120 30 158 88c-38 58-93 88-158 88S136 314 98 256z" fill="#111411" fill-opacity="0.78" stroke="url(#bronze)" stroke-width="11" stroke-linejoin="round"/>
    <path d="M178 256c18-46 44-70 78-70s60 24 78 70c-18 46-44 70-78 70s-60-24-78-70z" fill="#10120f" fill-opacity="0.84" stroke="url(#bronze)" stroke-width="9"/>
    <circle cx="256" cy="256" r="45" fill="#11120f" stroke="url(#bronze)" stroke-width="9"/>
    <g class="pupil-glow" filter="url(#emberGlow)">
      <circle cx="256" cy="256" r="33" fill="#e1a21a" opacity="0.28"/>
      <circle cx="256" cy="256" r="21" fill="url(#ember)"/>
    </g>
    <g stroke="url(#bronze)" stroke-width="7" stroke-linecap="round" fill="none" opacity="0.86">
      <path d="M223 237c0-26 13-45 35-54"/>
      <path d="M289 275c0 26-13 45-35 54"/>
      <path d="M296 216h22"/>
      <path d="M194 296h22"/>
      <circle cx="319" cy="216" r="8" fill="#c28b4d"/>
      <circle cx="194" cy="296" r="8" fill="#c28b4d"/>
    </g>
  </g>
</svg>
